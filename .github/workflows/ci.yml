name: Run CI build

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

jobs:
  prettier:
    name: Check frontend code formatting with prettier
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Run prettier linter
        run: npm run checkformat

  package-build:
    name: Build NPM package dist
    runs-on: ubuntu-latest

    environment:
      name: release
      url: https://www.npmjs.com/package/@open-formulieren/design-tokens
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Build artifacts
        run: |
          npm ci
          npm run build

      - name: Check for nesting level errors
        run: ./bin/check_token_nesting.py

      - name: Publish package to NPM
        if: startsWith(github.ref, 'refs/tags/')
        run: npm publish
